name: Master Pipeline
on: [push]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Java Core
        run: mvn -f health-app/pom.xml clean package
      - name: Security Test
        run: |
          npm install jest
          npx jest check.test.js
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & Push Container
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/master-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/master-app:latest
